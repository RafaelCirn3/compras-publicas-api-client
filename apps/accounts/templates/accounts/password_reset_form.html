<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Esqueceu a senha - RPA Licitacoes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
    <div class="card">
        <div class="card-body login-card-body">
            <p class="login-box-msg">Informe seu e-mail para recuperar a senha</p>
            <form method="post">
                {% csrf_token %}
                <label for="id_email">E-mail cadastrado</label>
                <input id="id_email" type="email" name="email" class="form-control mb-2" placeholder="seu@email.com" value="{{ form.email.value|default:'' }}" required>
                {% if form.email.errors %}<div class="text-danger small mb-2">{{ form.email.errors|striptags }}</div>{% endif %}
                {% if form.non_field_errors %}<div class="text-danger small mb-2">{{ form.non_field_errors|striptags }}</div>{% endif %}
                <div class="text-muted small mb-3">Enviaremos um link de redefinicao para este e-mail.</div>
                <button type="submit" class="btn btn-primary btn-block">Enviar e-mail</button>
            </form>
            <p class="mt-3 mb-0"><a href="{% url 'accounts:login' %}">Voltar ao login</a></p>
        </div>
    </div>
</div>
</body>
</html>
