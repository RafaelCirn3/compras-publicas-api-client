{% extends 'base.html' %}
{% block title %}Excluir filtro{% endblock %}
{% block content %}
<div class="card card-danger">
    <div class="card-header"><h3 class="card-title">Excluir filtro</h3></div>
    <div class="card-body">
        <p>Deseja realmente excluir o filtro <strong>{{ filtro }}</strong>?</p>
    </div>
    <div class="card-footer">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Excluir</button>
            <a href="{% url 'filtros:list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
