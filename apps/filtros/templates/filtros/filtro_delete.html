{% extends 'base.html' %}
{% block title %}Excluir filtro{% endblock %}
{% block content %}
<section class="surface" style="max-width: 720px;">
    <div class="surface-header">
        <h1 class="page-title h5 mb-0">Confirmar exclusao</h1>
    </div>
    <div class="surface-body">
        <p class="mb-4">Tem certeza que deseja excluir o filtro <strong>{{ filtro }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sim, excluir filtro</button>
            <a href="{% url 'filtros:list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</section>
{% endblock %}
